<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login</title>
  <link rel="icon" href="images/favicon.ico" type="image/svg+xml" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Lato&display=swap" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" />
  <link rel="stylesheet" href="css/login.css" />
  
</head>
<body class="d-flex align-items-center justify-content-center " >

 <div class="container " >
  <div id="formContainer">
    <div class="row justify-content-center ">
      <div class="col-md-5 col-lg-4">
        <div class="card shadow-sm border-0 p-4 rounded-4">
          <div class="text-center mb-2">
            <h1 class="mb-1 fs-4"><i class="bi bi-mortarboard-fill"></i>  AcademicGTD</h1>
            <p class="text-muted fs-5">Entre com suas credenciais</p>
          </div>
			<div id= "error-message"></div>
          <form id= "loginForm">
            <div class="mb-3">
              <input type="email" id="email" class="form-control" placeholder="Usuário" required autofocus />
            </div>

            <div class="mb-3">
              <input type="password" id="password" class="form-control" placeholder="Senha" required />
            </div>

            <div class="mb-3 text-end" id="forgotBtn">
              <a href="#" class="text-decoration-none small">Esqueci minha senha</a>
            </div>

            <div class="d-grid">
              <button class="btn btnadd" type="submit">Entrar</button>
            </div>

            <p class="text-center text-muted mt-4 mb-0">&copy; 2025</p>
          </form>
        </div>
      </div>
    </div>
    </div>
 </div>

  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.min.js"></script>
  <script src="scripts/login.js"></script>
</body>
</html>
